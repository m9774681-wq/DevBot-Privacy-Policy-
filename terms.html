<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terms of Service - ƬΗΣЦƧBӨƬ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="card">

    <h1 data-pt="📜 Termos de Uso" data-en="📜 Terms of Service"></h1>

    <p data-pt="Última atualização: 26 de Junho de 2026"
       data-en="Last updated: June 26, 2026"></p>

    <p data-pt="Ao usar o ƬΗΣЦƧBӨƬ você concorda com estes termos."
       data-en="By using ƬΗΣЦƧBӨƬ you agree to these terms."></p>

    <h2 data-pt="⚠️ Regras" data-en="⚠️ Rules"></h2>

    <ul>
        <li data-pt="Não abusar do bot" data-en="Do not abuse the bot"></li>
        <li data-pt="Não explorar bugs" data-en="Do not exploit bugs"></li>
        <li data-pt="Não tentar derrubar o sistema" data-en="Do not attempt to crash the system"></li>
    </ul>

    <h2 data-pt="🛠️ Disponibilidade" data-en="🛠️ Availability"></h2>

    <p data-pt="O bot pode ficar offline para manutenção."

    <a class="btn" href="index.html" data-pt="⬅ Voltar" data-en="⬅ Back"></a>

</div>
</div>

<!-- LANG SCRIPT -->
<script>
(function () {

    function applyLang(lang) {
        localStorage.setItem("lang", lang);

        document.querySelectorAll("[data-pt]").forEach(el => {
            const value = el.getAttribute("data-" + lang);
            if (value) el.innerText = value;
        });
    }

    function getLang() {
        return localStorage.getItem("lang") || "pt";
    }

    function createUI() {
        const div = document.createElement("div");
        div.className = "lang-switch";

        div.innerHTML = `
            <button id="pt">PT 🇧🇷</button>
            <button id="en">EN 🇺🇸</button>
        `;

        document.body.appendChild(div);

        document.getElementById("pt").onclick = () => applyLang("pt");
        document.getElementById("en").onclick = () => applyLang("en");
    }

    function init() {
        createUI();
        applyLang(getLang());
    }

    document.addEventListener("DOMContentLoaded", init);

})();
</script>

</body>
</html>
