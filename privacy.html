<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Privacy Policy - ƬΗΣЦƧBӨƬ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
<div class="card">

    <h1 data-pt="🔒 Política de Privacidade" data-en="🔒 Privacy Policy"></h1>

    <p data-pt="Última atualização: 26 de Junho de 2026"
       data-en="Last updated: June 26, 2026"></p>

    <p data-pt="Esta Política explica como o ƬΗΣЦƧBӨƬ coleta e utiliza dados dentro do Discord."
       data-en="This Policy explains how ƬΗΣЦƧBӨƬ collects and uses Discord data."></p>

    <h2 data-pt="📊 Dados coletados" data-en="📊 Data collected"></h2>

    <ul>
        <li data-pt="IDs de usuários do Discord" data-en="Discord user IDs"></li>
        <li data-pt="IDs de servidores (guilds)" data-en="Server (guild) IDs"></li>
        <li data-pt="IDs de canais" data-en="Channel IDs"></li>
        <li data-pt="IDs de cargos (roles)" data-en="Role IDs"></li>
        <li data-pt="Configurações do servidor" data-en="Server configuration data"></li>
    </ul>

    <h2 data-pt="⚙️ Uso dos dados" data-en="⚙️ How data is used"></h2>

    <p data-pt="Os dados são usados apenas para funcionalidades do bot como moderação, economia, tickets e comandos."
       data-en="Data is only used for bot features like moderation, economy, tickets and commands."></p>

    <h2 data-pt="🔐 Compartilhamento" data-en="🔐 Data sharing"></h2>

    <p data-pt="Não vendemos nem compartilhamos dados com terceiros."
       data-en="We do not sell or share data with third parties."></p>

    <h2 data-pt="🧹 Remoção de dados" data-en="🧹 Data removal"></h2>

    <p data-pt="Você pode solicitar remoção de dados entrando em contato com o suporte."
       data-en="You can request data removal by contacting support."></p>

    <a class="btn" href="index.html" data-pt="⬅ Voltar" data-en="⬅ Back"></a>

</div>
</div>

<!-- LANG SCRIPT -->
<script>
(function () {

    function applyLang(lang) {
        localStorage.setItem("lang", lang);

        document.querySelectorAll("[data-pt]").forEach(el => {
            const value = el.getAttribute("data-" + lang);
            if (value) el.innerText = value;
        });
    }

    function getLang() {
        return localStorage.getItem("lang") || "pt";
    }

    function createUI() {
        const div = document.createElement("div");
        div.className = "lang-switch";

        div.innerHTML = `
            <button id="pt">PT 🇧🇷</button>
            <button id="en">EN 🇺🇸</button>
        `;

        document.body.appendChild(div);

        document.getElementById("pt").onclick = () => applyLang("pt");
        document.getElementById("en").onclick = () => applyLang("en");
    }

    function init() {
        createUI();
        applyLang(getLang());
    }

    document.addEventListener("DOMContentLoaded", init);

})();
</script>

</body>
</html>
